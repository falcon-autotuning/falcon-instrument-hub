<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FALCon Data Viewer</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --accent-hover: #79c0ff;
      --green: #3fb950;
      --orange: #d29922;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* --- Header --- */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    header h1 span { color: var(--accent); }

    /* --- Layout --- */
    .layout {
      display: flex;
      height: calc(100vh - 49px);
    }

    /* --- Sidebar --- */
    .sidebar {
      width: 280px;
      min-width: 280px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }
    .sidebar h2 {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      padding: 16px 16px 8px;
    }
    .measurement-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 8px;
    }
    .measurement-item {
      padding: 10px 12px;
      border-radius: 6px;
      cursor: pointer;
      margin-bottom: 2px;
      transition: background 0.15s;
    }
    .measurement-item:hover { background: rgba(88, 166, 255, 0.1); }
    .measurement-item.active { background: rgba(88, 166, 255, 0.15); border-left: 3px solid var(--accent); }
    .measurement-item .id { font-weight: 600; font-size: 14px; }
    .measurement-item .meta {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .measurement-item .badge {
      display: inline-block;
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 10px;
      font-weight: 600;
      margin-left: 4px;
    }
    .badge.raw { background: rgba(63, 185, 80, 0.2); color: var(--green); }
    .badge.avg { background: rgba(210, 153, 34, 0.2); color: var(--orange); }

    /* --- Main --- */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .toolbar {
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .toolbar label {
      font-size: 13px;
      color: var(--text-muted);
    }
    .toolbar select, .toolbar input[type="number"] {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 13px;
    }
    .toolbar select:focus, .toolbar input:focus {
      outline: none;
      border-color: var(--accent);
    }
    .toggle-group {
      display: flex;
      gap: 2px;
      background: var(--bg);
      border-radius: 6px;
      padding: 2px;
    }
    .toggle-btn {
      padding: 4px 12px;
      font-size: 12px;
      font-weight: 600;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      background: transparent;
      color: var(--text-muted);
      transition: all 0.15s;
    }
    .toggle-btn.active { background: var(--accent); color: #fff; }
    .toggle-btn:hover:not(.active) { color: var(--text); }

    /* --- Plot area --- */
    .plot-container {
      flex: 1;
      padding: 16px 24px;
      overflow-y: auto;
    }
    #plot { width: 100%; height: 100%; min-height: 500px; }
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-muted);
    }
    .empty-state svg { width: 64px; height: 64px; margin-bottom: 16px; opacity: 0.4; }
    .empty-state p { font-size: 15px; }

    /* --- Loading spinner --- */
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <h1><span>FALCon</span> Data Viewer</h1>
</header>

<div class="layout">
  <!-- Sidebar: measurement list -->
  <aside class="sidebar">
    <h2>Measurements</h2>
    <div class="measurement-list" id="measurementList">
      <div class="spinner" style="margin-top:40px"></div>
    </div>
  </aside>

  <!-- Main content -->
  <section class="main">
    <div class="toolbar" id="toolbar" style="display:none">
      <label for="channelSelect">Channel:</label>
      <select id="channelSelect"></select>

      <div class="toggle-group">
        <button class="toggle-btn active" data-show="both">Both</button>
        <button class="toggle-btn" data-show="averaged">Averaged</button>
        <button class="toggle-btn" data-show="raw">Raw Only</button>
      </div>

      <label style="margin-left:auto" for="rawOpacity">Raw opacity:</label>
      <input type="number" id="rawOpacity" value="0.25" min="0.05" max="1" step="0.05" style="width:64px">
    </div>

    <div class="plot-container">
      <div id="emptyState" class="empty-state">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 013 19.875v-6.75zM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V8.625zM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V4.125z" />
        </svg>
        <p>Select a measurement from the sidebar to plot</p>
      </div>
      <div id="plot" style="display:none"></div>
    </div>
  </section>
</div>

<script>
// =========================================================================
// State
// =========================================================================
let measurements = [];
let currentData = null;
let showMode = "both";   // both | averaged | raw

// =========================================================================
// Colour palette for raw traces
// =========================================================================
const RAW_COLOURS = [
  "#636efa","#ef553b","#00cc96","#ab63fa","#ffa15a",
  "#19d3f3","#ff6692","#b6e880","#ff97ff","#fecb52",
];

// =========================================================================
// Bootstrap
// =========================================================================
document.addEventListener("DOMContentLoaded", async () => {
  await loadMeasurements();
  bindToolbar();
});

async function loadMeasurements() {
  const res = await fetch("/api/measurements");
  measurements = await res.json();
  renderList();
}

function renderList() {
  const el = document.getElementById("measurementList");
  if (!measurements || measurements.length === 0) {
    el.innerHTML = '<p style="padding:16px;color:var(--text-muted)">No measurements found.</p>';
    return;
  }
  el.innerHTML = measurements.map(m => `
    <div class="measurement-item" data-id="${m.id}" onclick="selectMeasurement('${m.id}')">
      <div class="id">${m.id}
        <span class="badge avg">AVG</span>
        ${m.has_raw ? '<span class="badge raw">RAW</span>' : ''}
      </div>
      <div class="meta">${m.sweep_gate} &middot; ${m.num_points} pts &middot; ${m.num_sweeps} sweeps</div>
    </div>
  `).join("");
}

// =========================================================================
// Selection
// =========================================================================
async function selectMeasurement(id) {
  // Highlight
  document.querySelectorAll(".measurement-item").forEach(el => {
    el.classList.toggle("active", el.dataset.id === id);
  });

  // Fetch plot data
  const res = await fetch(`/api/measurements/${id}/plot`);
  if (!res.ok) {
    alert("Failed to load measurement data");
    return;
  }
  currentData = await res.json();

  // Populate channel dropdown
  const channels = Object.keys(currentData.averaged);
  const sel = document.getElementById("channelSelect");
  sel.innerHTML = channels.map(c => `<option value="${c}">${c}</option>`).join("");

  document.getElementById("toolbar").style.display = "flex";
  document.getElementById("emptyState").style.display = "none";
  document.getElementById("plot").style.display = "block";

  renderPlot();
}

// =========================================================================
// Toolbar
// =========================================================================
function bindToolbar() {
  // Show mode toggles
  document.querySelectorAll(".toggle-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".toggle-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      showMode = btn.dataset.show;
      renderPlot();
    });
  });

  document.getElementById("channelSelect").addEventListener("change", renderPlot);
  document.getElementById("rawOpacity").addEventListener("change", renderPlot);
}

// =========================================================================
// Plot rendering
// =========================================================================
function renderPlot() {
  if (!currentData) return;

  const channel = document.getElementById("channelSelect").value;
  const rawOpacity = parseFloat(document.getElementById("rawOpacity").value) || 0.25;
  const traces = [];

  const voltages = currentData.voltages;

  // Scale factor for display (auto-detect nA / µA / mA)
  const avgVals = currentData.averaged[channel] || [];
  const maxAbsVal = Math.max(...avgVals.map(Math.abs));
  let scale = 1, unitLabel = "A";
  if (maxAbsVal > 0 && maxAbsVal < 1e-6)      { scale = 1e9;  unitLabel = "nA"; }
  else if (maxAbsVal < 1e-3)                    { scale = 1e6;  unitLabel = "µA"; }
  else if (maxAbsVal < 1)                       { scale = 1e3;  unitLabel = "mA"; }

  // --- Raw traces ---
  if ((showMode === "both" || showMode === "raw") && currentData.raw_traces) {
    currentData.raw_traces.forEach((rt, i) => {
      const vals = rt.channels[channel];
      if (!vals) return;
      traces.push({
        x: voltages,
        y: vals.map(v => v * scale),
        type: "scatter",
        mode: "lines",
        name: `Sweep ${rt.sweep_index}`,
        line: {
          color: RAW_COLOURS[i % RAW_COLOURS.length],
          width: 1,
        },
        opacity: rawOpacity,
        legendgroup: "raw",
        legendgrouptitle: { text: "Raw Traces" },
        hovertemplate: `Sweep ${rt.sweep_index}<br>V = %{x:.4f} V<br>I = %{y:.3f} ${unitLabel}<extra></extra>`,
      });
    });
  }

  // --- Averaged trace ---
  if (showMode === "both" || showMode === "averaged") {
    traces.push({
      x: voltages,
      y: avgVals.map(v => v * scale),
      type: "scatter",
      mode: "lines",
      name: "Averaged",
      line: { color: "#ff0", width: 2.5 },
      legendgroup: "averaged",
      hovertemplate: `Averaged<br>V = %{x:.4f} V<br>I = %{y:.3f} ${unitLabel}<extra></extra>`,
    });
  }

  const layout = {
    title: {
      text: `${currentData.measurement_id}  —  ${currentData.sweep_gate} sweep  (${currentData.num_sweeps} sweeps)`,
      font: { color: "#e6edf3", size: 16 },
    },
    paper_bgcolor: "#0d1117",
    plot_bgcolor: "#161b22",
    font: { color: "#8b949e" },
    xaxis: {
      title: { text: `${currentData.sweep_gate} Voltage (V)`, font: { color: "#e6edf3" } },
      gridcolor: "#30363d",
      zerolinecolor: "#484f58",
    },
    yaxis: {
      title: { text: `Current (${unitLabel})`, font: { color: "#e6edf3" } },
      gridcolor: "#30363d",
      zerolinecolor: "#484f58",
      exponentformat: "e",
    },
    legend: {
      bgcolor: "rgba(22,27,34,0.85)",
      bordercolor: "#30363d",
      borderwidth: 1,
      font: { color: "#e6edf3" },
    },
    margin: { l: 72, r: 24, t: 56, b: 56 },
    hovermode: "x unified",
  };

  const config = {
    responsive: true,
    displaylogo: false,
    modeBarButtonsToAdd: ["toggleSpikelines"],
  };

  Plotly.react("plot", traces, layout, config);
}

// Replot on resize
window.addEventListener("resize", () => {
  if (currentData) Plotly.Plots.resize("plot");
});
</script>

</body>
</html>
