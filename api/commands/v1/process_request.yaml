name: PROCESS_REQUEST
version: 1.0.0
description: A request to the interpreter to process an incoming measurement

parameters:
  <<: *process_id

  request:
    type: jsonable
    required: true
    description: The measurement request from FAlCon

  configurations:
    type: json
    required: true
    description: The configurations of the instruments loaded into the instrument server

  data_path:
    type: string
    required: true
    description: The filepath to the spot in the HDF5 database to store the collected data at

