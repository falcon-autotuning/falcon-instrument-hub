name: MEASUREMENT_READY
version: 1.0.0
description: Indicates that a meassurement is ready for the server to perform

parameters:
  <<: [*process_id, *timestamp]

  getters:
    type: array
    required: true
    items: jsonable
    description: the connections that are ready to be measured

  setters:
    type: array
    required: true 
    items: jsonable
    description: the connections that are to be set when buffered
