name: Cross-Platform Integration Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.23"

jobs:
  test-linux:
    runs-on: ubuntu-latest
    services:
      nats:
        image: nats:latest
        ports:
          - 4222:4222
          - 8222:8222
        options: >-
          --health-cmd "wget --no-verbose --tries=1 --spider http://localhost:8222/varz || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Stub falcon-core-libs module
        run: |
          mkdir -p ../falcon-core-libs/go/falcon-core
          printf 'module github.com/falcon-autotuning/falcon-core-libs/go/falcon-core\n\ngo 1.23\n' \
            > ../falcon-core-libs/go/falcon-core/go.mod

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements-dev.txt

      - name: Build Go binary
        run: |
          cd runtime
          go mod download
          go build -o bin/instrument-hub-server cmd/main.go

      - name: Wait for NATS
        run: |
          timeout 30 bash -c 'until curl -f http://localhost:8222/varz; do sleep 1; done'

      - name: Run unit tests
        run: pytest tests/test_interpreter_daemon.py -v

      - name: Run integration tests
        run: pytest tests/test_launch_script_interpreter.py -v

      - name: Run full system tests
        run: pytest tests/integration/ -v

  test-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Stub falcon-core-libs module
        shell: bash
        run: |
          mkdir -p ../falcon-core-libs/go/falcon-core
          printf 'module github.com/falcon-autotuning/falcon-core-libs/go/falcon-core\n\ngo 1.23\n' \
            > ../falcon-core-libs/go/falcon-core/go.mod

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Start NATS with JetStream
        run: |
          go install github.com/nats-io/nats-server/v2@latest
          Start-Process -FilePath "$env:GOPATH\bin\nats-server.exe" -ArgumentList "--jetstream", "--port", "4222", "--http_port", "8222" -WindowStyle Hidden
          Start-Sleep -Seconds 3

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements-dev.txt

      - name: Build Go binary
        run: |
          cd runtime
          go mod download
          go build -o bin/instrument-hub-server.exe cmd/main.go

      - name: Run unit tests
        run: pytest tests/test_interpreter_daemon.py -v

      - name: Run integration tests
        run: pytest tests/test_launch_script_interpreter.py -v

  test-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Stub falcon-core-libs module
        run: |
          mkdir -p ../falcon-core-libs/go/falcon-core
          printf 'module github.com/falcon-autotuning/falcon-core-libs/go/falcon-core\n\ngo 1.23\n' \
            > ../falcon-core-libs/go/falcon-core/go.mod

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install NATS server
        run: |
          brew install nats-server
          nats-server --jetstream --port 4222 --http_port 8222 &
          sleep 3

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r requirements-dev.txt

      - name: Build Go binary
        run: |
          cd runtime
          go mod download
          go build -o bin/instrument-hub-server cmd/main.go

      - name: Run tests
        run: |
          pytest tests/test_interpreter_daemon.py -v
          pytest tests/test_launch_script_interpreter.py -v
