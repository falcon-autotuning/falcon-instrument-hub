site_name: Falcon Instrument Hub
site_description: Bridge between falcon-core measurement requests and hardware instruments
theme:
  name: material
  palette:
    - media: "(prefers-color-scheme)"
      primary: pink
      accent: pink
      toggle:
        icon: material/brightness-auto
        name: "Switch to light mode"
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: pink
      accent: pink
      toggle:
        icon: material/brightness-7
        name: "Switch to dark mode"
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: pink
      accent: pink
      toggle:
        icon: material/brightness-4
        name: "Switch to system preference"
  features:
    - content.tabs.link
    - content.code.annotate
    - content.code.copy
    - announce.dismiss
    - navigation.tabs
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.preview
    - navigation.instant.progress
    - navigation.path
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.suggest
    - toc.follow
  logo: assets/icons/icon-256.png
  favicon: assets/icons/icon-256.png
nav:
  - Get Started:
      - Welcome to Falcon Instrument Hub: index.md
  - Configuration:
      - Device Configuration: CONFIG_VALIDATION.md
      - Lua Script Authoring: LUA_SCRIPT_AUTHORING.md
  - Architecture:
      - Server & Interpreter: server-interpreter.md
      - NATS Protocol: nats-protocol.md
  - Tools:
      - Data Viewer: data-viewer.md
markdown_extensions:
  - tables
  - toc:
      permalink: true
      title: Page contents
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      pygments_lang_class: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
